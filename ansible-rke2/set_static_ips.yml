# set_static_ip.yml
# This playbook sets the specified hosts to static IP addresses.
# It imports evaluate_ip.yml first to determine which IP Ansible can currently SSH into.

- import_playbook: evaluate_ip.yml

- name: Set static IPs on Rocky Linux with dynamic interface detection
  hosts: ClusterGroup
  become: yes
  gather_facts: no

  tasks:
    # ----------------------------
    # Detect ethernet devices
    # ----------------------------
    - name: Find ethernet devices and their state
      ansible.builtin.command:
        argv:
          - nmcli
          - -t
          - -f
          - DEVICE,TYPE,STATE
          - device
          - status
      register: nmcli_dev
      changed_when: false

    - name: Build list of ethernet device names
      ansible.builtin.set_fact:
        eth_devs: >-
          {{
            nmcli_dev.stdout_lines
            | select('search', ':ethernet:')
            | map('regex_replace', ':ethernet:.*$', '')
            | reject('equalto', '')
            | list
          }}

    - name: Debug ethernet devices discovered
      ansible.builtin.debug:
        var: eth_devs

    - name: Fail if fewer than 2 ethernet NICs found
      ansible.builtin.fail:
        msg: "Need at least 2 ethernet NICs. Found={{ eth_devs | length }} {{ eth_devs }}"
      when: eth_devs | length < 2

    - name: Select external/internal devices
      ansible.builtin.set_fact:
        eth_iface: "{{ eth_devs[0] }}"
        eth_iface2: "{{ eth_devs[1] }}"

    - name: Debug selected devices
      ansible.builtin.debug:
        msg:
          - "Selected external device: {{ eth_iface }}"
          - "Selected internal device: {{ eth_iface2 }}"

    # ----------------------------
    # Resolve device -> active connection profile
    # nmcli con mod requires CONNECTION name, not DEVICE name.
    # ----------------------------
    - name: Get NetworkManager connection profile for external device
      ansible.builtin.command:
        argv:
          - nmcli
          - -g
          - GENERAL.CONNECTION
          - device
          - show
          - "{{ eth_iface }}"
      register: ext_con_raw
      changed_when: false

    - name: Get NetworkManager connection profile for internal device
      ansible.builtin.command:
        argv:
          - nmcli
          - -g
          - GENERAL.CONNECTION
          - device
          - show
          - "{{ eth_iface2 }}"
      register: int_con_raw
      changed_when: false

    - name: Set connection profile facts
      ansible.builtin.set_fact:
        ext_con: "{{ ext_con_raw.stdout | trim }}"
        int_con: "{{ int_con_raw.stdout | trim }}"

    - name: Fail if external/internal connection profile could not be resolved
      ansible.builtin.fail:
        msg: >-
          Could not resolve connection profile(s).
          ext_con='{{ ext_con }}'
          int_con='{{ int_con }}'
          external_device='{{ eth_iface }}'
          internal_device='{{ eth_iface2 }}'
      when:
        - ext_con in ['', '--'] or int_con in ['', '--']

    - name: Debug selected connection profiles
      ansible.builtin.debug:
        msg:
          - "External connection profile: {{ ext_con }} on {{ eth_iface }}"
          - "Internal connection profile: {{ int_con }} on {{ eth_iface2 }}"

    # ----------------------------
    # Configure external NIC
    # This gets the default route.
    # ----------------------------
    - name: Configure external static IP using nmcli
      ansible.builtin.command:
        argv:
          - nmcli
          - con
          - mod
          - "{{ ext_con }}"
          - ipv4.addresses
          - "{{ external_address.ip }}/{{ netmask }}"
          - ipv4.gateway
          - "{{ external_address.gateway }}"
          - ipv4.dns
          - "{{ external_address.dns }}"
          - ipv4.method
          - manual
          - ipv4.never-default
          - "no"
          - connection.autoconnect
          - "yes"

    # ----------------------------
    # Configure internal NIC
    # No default route.
    # ----------------------------
    - name: Configure internal static IP using nmcli
      ansible.builtin.command:
        argv:
          - nmcli
          - con
          - mod
          - "{{ int_con }}"
          - ipv4.addresses
          - "{{ internal_address.ip }}/{{ netmask }}"
          - ipv4.gateway
          - ""
          - ipv4.dns
          - "{{ internal_address.dns }}"
          - ipv4.method
          - manual
          - ipv4.never-default
          - "yes"
          - connection.autoconnect
          - "yes"

    # ----------------------------
    # Apply connections
    # ---------------------------
    - name: Bring first connection up asynchronously
      ansible.builtin.command:
        argv:
          - nmcli
          - con
          - up
          - "{{ ext_con }}"
      async: 15
      poll: 0
      ignore_errors: true

    - name: Bring second connection up asynchronously
      ansible.builtin.command:
        argv:
          - nmcli
          - con
          - up
          - "{{ int_con }}"
      async: 15
      poll: 0
      ignore_errors: true

- name: reget the ips bby
  import_playbook: evaluate_ip.yml
- name: teah
  hosts: ClusterGroup
  become: yes
  gather_facts: yes
  
  tasks:

    - name: Confirm external interface IP
      ansible.builtin.command:
        argv:
          - ip
          - -4
          - addr
          - show
          - dev
          - "{{ eth_iface }}"
      register: ip_check_ext
      changed_when: false

    - name: Confirm internal interface IP
      ansible.builtin.command:
        argv:
          - ip
          - -4
          - addr
          - show
          - dev
          - "{{ eth_iface2 }}"
      register: ip_check_int
      changed_when: false

    - name: Display assigned IPs
      ansible.builtin.debug:
        msg:
          - "External device {{ eth_iface }}:"
          - "{{ ip_check_ext.stdout_lines }}"
          - "Internal device {{ eth_iface2 }}:"
          - "{{ ip_check_int.stdout_lines }}"

    - name: Show routing table
      ansible.builtin.command:
        argv:
          - ip
          - route
      register: route_check
      changed_when: false

    - name: Display routes
      ansible.builtin.debug:
        var: route_check.stdout_lines